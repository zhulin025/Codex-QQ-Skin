name: Publish release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing draft release tag
        required: true
        default: v2.5.0

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Test Windows package
        shell: powershell
        run: .\tests\windows\run-tests.ps1

      - name: Build Windows installer
        shell: powershell
        run: .\scripts\windows\build-gui-installer.ps1 -UseInstalledNode -OutputFileName 'ChatGPT QQ Skin Setup 2.5.0.exe'

      - name: Upload Windows assets and publish release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          $installer = Get-Item '.\release\ChatGPT QQ Skin Setup 2.5.0.exe'
          $checksum = "$($installer.FullName).sha256"
          gh release upload $env:RELEASE_TAG $installer.FullName $checksum --clobber
          gh release edit $env:RELEASE_TAG --draft=false --latest
