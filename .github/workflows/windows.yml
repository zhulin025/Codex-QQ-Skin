name: Windows build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/windows.yml'
      - 'assets/**'
      - 'presets/**'
      - 'scripts/**'
      - 'tests/**'
      - '*.cmd'
      - 'package.json'
      - 'README-WINDOWS.md'
  pull_request:
    paths:
      - '.github/workflows/windows.yml'
      - 'assets/**'
      - 'presets/**'
      - 'scripts/**'
      - 'tests/**'
      - '*.cmd'
      - 'package.json'
      - 'README-WINDOWS.md'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Run Windows tests
        shell: powershell
        run: .\tests\windows\run-tests.ps1

      - name: Build native Windows installer
        shell: powershell
        run: .\scripts\windows\build-gui-installer.ps1 -UseInstalledNode -OutputFileName 'ChatGPT QQ Skin Setup 2.5.2.exe'

      - name: Inspect installer
        shell: powershell
        run: |
          $installer = Get-Item '.\release\ChatGPT QQ Skin Setup 2.5.2.exe'
          if ($installer.Length -lt 1MB) { throw 'Windows installer is unexpectedly small.' }
          if (-not (Test-Path "$($installer.FullName).sha256")) { throw 'Installer checksum was not created.' }

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: ChatGPT-QQ-Skin-Setup-2.5.2
          path: |
            release/ChatGPT QQ Skin Setup 2.5.2.exe
            release/ChatGPT QQ Skin Setup 2.5.2.exe.sha256
          if-no-files-found: error
          retention-days: 30
